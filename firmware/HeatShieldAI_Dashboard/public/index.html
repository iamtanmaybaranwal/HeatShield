<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heatshield Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <img src="logo.png" alt="" class="app-header__logo" onerror="this.style.display='none'" />
      <div>
        <h1>Heatshield</h1>
        <span>Worker Heat-Stress Dashboard</span>
      </div>
    </div>
    <div class="app-header__user" id="header-user"></div>
    <div class="app-header__meta" id="header-meta">&mdash;</div>
  </header>

  <main id="app-root">
    <div class="spinner-row">Loading&hellip;</div>
  </main>

  <script
    src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"
    integrity="sha384-ZaR6mWzmJtrRibZ1Vm7SoHFr8OXjyAuGAXalGDKqbxFT18oi/z+oZLIRFkpeNor1"
    crossorigin="anonymous"
  ></script>
  <script
    src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"
    integrity="sha384-I1LYojsZ5RM1cOda44Z2h42Qa6YfsQ1XkXxREnhp4ueYBR/4d1pG1K+NZM537Vsj"
    crossorigin="anonymous"
  ></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"
    integrity="sha256-s4B2di9zY7yekStouOA0gmeY213ya7YfAA7C56MTe8c="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
