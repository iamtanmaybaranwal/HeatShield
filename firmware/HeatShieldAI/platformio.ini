; HeatShieldAI firmware - PlatformIO project configuration
;
; Target: ESP32-S3-WROOM-1 dev board (esp32-s3-devkitc-1 board definition),
; Arduino framework. Ported from the original ESP32-D0WD (esp32dev) target --
; GPIO assignments live in sensors.h / alerts.h and were deliberately chosen
; to avoid pins reserved on the S3 (SPI flash bus, optional octal PSRAM bus,
; strapping pins, native-USB D+/D-) since the exact flash/PSRAM variant of a
; bare ESP32-S3-WROOM-1 module isn't always known up front.
;
; Library choices (see README.md "Troubleshooting" for background/alternatives):
;   - Chirale_TensorFlowLite: actively maintained (2024+) Arduino port of
;     TensorFlow Lite Micro with "esp32" architecture support. Chosen over
;     the older tanakamasayuki/TensorFlowLite_ESP32 port, which upstream
;     itself now flags as outdated/superseded.
;   - SparkFun MAX3010x: raw IR/RED FIFO access for the MAX30102. HeatShieldAI
;     implements its own lightweight peak-detection BPM and ratio-of-ratios
;     SpO2 estimator on top of these raw samples (see sensors.cpp) rather
;     than depending on Maxim's example-only algorithm file, which is not
;     part of the installable library and would break "compiles without
;     modification".
;
; platform version is pinned to a known-good release rather than "latest" so
; a future breaking platform-espressif32 release can't silently break this
; build.
[env:esp32-s3-devkitc-1]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Most ESP32-S3 dev boards (including plain WROOM-1 boards wired like a
; DevKitC-1) have a USB-UART bridge chip, so Serial behaves exactly like on
; the old ESP32 board and no extra USB config is needed. If your specific
; board instead exposes ONLY the S3's native USB pins (GPIO19/20) with no
; separate UART bridge, uncomment the two build_flags below so Serial is
; routed over native USB-CDC instead:
;   -DARDUINO_USB_MODE=1
;   -DARDUINO_USB_CDC_ON_BOOT=1

; TensorFlow Lite Micro (and this project's C++ code) use features beyond
; the Arduino core's default C++11 setting.
build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    spaziochirale/Chirale_TensorFlowLite@^2.0.0
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit Unified Sensor@^1.1.9
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.1
    sandeepmistry/LoRa@^0.8.0
    mikalhart/TinyGPSPlus@^1.0.3
