; HeatShieldAI Gateway firmware - PlatformIO project configuration
;
; Target: classic ESP32 Dev Module (the "ESP-32" 38-pin devkit board), Arduino
; framework. This is the LoRa gateway counterpart to ../HeatShieldAI (the
; ESP32-S3 sensor node) -- it has no sensors/display/model of its own. It
; receives HeatShieldLoRaPacket telemetry over an SX1278 "Ra-02" 433MHz LoRa
; module, prints it to Serial, and forwards it over WiFi to the Node.js
; backend in ../HeatShieldAI_Dashboard (see wifi_config.h.example --
; copy it to wifi_config.h and fill in your WiFi + backend URL before
; building).
;
; platform version is pinned to match the node project so both firmwares are
; built against the same Arduino-ESP32 core version. WiFi.h/HTTPClient.h
; ship with the espressif32 Arduino core itself, so only ArduinoJson (for
; building the outgoing payload) needs to be listed explicitly.
[env:esp32dev]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    sandeepmistry/LoRa@^0.8.0
    bblanchon/ArduinoJson@^7.0.0
